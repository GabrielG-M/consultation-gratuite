<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réservation Consultation Viandes Sous-Vide</title>
<style>
body, html {
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
  background-color: #000;
  color: #fff;
  scroll-behavior: smooth;
}

.hero-section {
  position: relative;
  width: 100%;
  min-height: 100vh; /* pleine hauteur */
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
}

.form-overlay {
  background-color: rgba(0,0,0,0.75); /* semi-transparent pour contraste */
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 0 20px #d71f26;
  width: 90%;
  max-width: 600px;
}

.form-overlay h1 {
  text-align:center;
  margin-bottom:20px;
  color: #fff;
}

.form-overlay label {
  display:block;
  margin-top:12px;
  font-weight:bold;
  color:#fff;
}

.form-overlay input, .form-overlay select, .form-overlay textarea {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:none;
  font-size:16px;
}

button {
  margin-top:15px;
  padding:14px;
  width:100%;
  font-size:18px;
  background-color:#000;
  color:#fff;
  border:none;
  border-radius:10px;
  box-shadow:0 0 15px #d71f26;
  cursor:pointer;
}
button:hover { box-shadow:0 0 20px #d71f26; }

.message {
  text-align:center;
  margin-top:15px;
  font-size:18px;
  color:#fff;
}

/* sections suivantes avec d’autres images */
.section {
  position: relative;
  width: 100%;
  min-height: 100vh;
  background-size: cover;
  background-position: center;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>
<body>

<!-- Première section bannière -->
<div class="hero-section" style="background-image:url('https://i.postimg.cc/jSkY4Q45/572747608-1337203328416421-3726285898224121925-n.jpg');">
  <div class="form-overlay">
    <h1>Réservez votre consultation gratuite</h1>
    <p>🎁 Recevez une <strong>boîte d’échantillons gourmets</strong> si votre foyer est qualifié 🥩.<br>
    Les deux adultes (M. et Mme) doivent remplir leurs noms et numéros de téléphone, sauf si vous vivez seul.</p>
    <form id="reservationForm" action="https://formspree.io/f/mnjgybyw" method="POST">
      <label>Nom M. :</label><input type="text" name="nomM" required>
      <label>Téléphone M. :</label><input type="text" name="telM" required>
      <label>Nom Mme :</label><input type="text" name="nomMme" required>
      <label>Téléphone Mme :</label><input type="text" name="telMme" required>
      <label>Nombre d’adultes :</label><input type="number" name="adultes" min="1" max="10" required>
      <label>Nombre d’enfants :</label><input type="number" name="enfants" min="0" max="10" required>
      <label>Épiceries :</label><textarea name="epiceries" maxlength="100" required></textarea>
      <label>Dépense hebdomadaire :</label>
      <select name="depense" required>
        <option value="">--Choisir--</option>
        <option value="moins50">Moins de 50$</option>
        <option value="50ouplus">50$ ou plus</option>
      </select>
      <label>Congélateur séparé :</label>
      <select name="congelateur" required>
        <option value="">--Choisir--</option>
        <option value="oui">Oui</option>
        <option value="non">Non</option>
      </select>
      <label>Niveau congélateur :</label>
      <select name="niveauCongelateur" required>
        <option value="">--Choisir--</option>
        <option value="1/4">1/4</option>
        <option value="1/2">1/2</option>
        <option value="3/4">3/4</option>
      </select>
      <label>Adresse :</label><input type="text" name="adresse" required>
      <label>Ville / Code postal :</label><input type="text" name="ville" required>
      <label>Date consultation :</label><input type="date" id="date" name="date" required>
      <label>Créneau :</label>
      <select name="heure" required>
        <option value="">--Choisir une heure--</option>
        <option value="09:00">09h00 - 10h00</option>
        <option value="10:00">10h00 - 11h00</option>
        <option value="11:00">11h00 - 12h00</option>
        <option value="12:00">12h00 - 13h00</option>
        <option value="13:00">13h00 - 14h00</option>
        <option value="14:00">14h00 - 15h00</option>
        <option value="15:00">15h00 - 16h00</option>
        <option value="16:00">16h00 - 17h00</option>
        <option value="17:00">17h00 - 18h00</option>
        <option value="18:00">18h00 - 19h00</option>
        <option value="19:00">19h00 - 20h00</option>
        <option value="20:00">20h00 - 21h00</option>
      </select>
      <input type="hidden" name="_subject" value="Nouvelle réservation garde-manger">
      <button type="submit">Réservez ma consultation gratuite</button>
    </form>
    <div id="message" class="message"></div>
  </div>
</div>

<!-- Section 2 -->
<div class="section" style="background-image:url('https://i.postimg.cc/YSsg7Vfr/573312272-1335421028594651-758166083430097576-n.jpg');"></div>
<!-- Section 3 -->
<div class="section" style="background-image:url('https://i.postimg.cc/vZG5t5H2/550671744-1301797275290360-8850951111755897144-n.jpg');"></div>
<!-- Section 4 -->
<div class="section" style="background-image:url('https://i.postimg.cc/YSsg7Vfr/573312272-1335421028594651-758166083430097576-n.jpg');"></div>

<script>
// Date min = aujourd'hui + 48h
const dateInput = document.getElementById("date");
const today = new Date();
today.setHours(0,0,0,0);
const minDate = new Date(today.getTime() + 48*60*60*1000);
dateInput.min = minDate.toISOString().split("T")[0];

// Form submission
document.getElementById("reservationForm").addEventListener("submit", function(e){
  e.preventDefault();
  const form = e.target;
  const messageDiv = document.getElementById("message");

  const adultes = parseInt(form.adultes.value);
  const nomM = form.nomM.value.trim();
  const nomMme = form.nomMme.value.trim();
  const telM = form.telM.value.trim();
  const telMme = form.telMme.value.trim();

  if(adultes > 1 && (!nomM || !nomMme || !telM || !telMme)){
    messageDiv.innerHTML = "Veuillez remplir les noms et numéros de téléphone pour M. et Mme si plus d’un adulte.";
    messageDiv.style.color = "white";
    return;
  }

  const depense = form.depense.value;
  const epiceries = form.epiceries.value.toLowerCase();
  const nonQualifie = (depense === "moins50") || epiceries.includes("super c") || epiceries.includes("maxi");

  if(nonQualifie){
    messageDiv.innerHTML = `
      Merci pour votre intérêt. Nous allons vous recontacter prochainement.<br>
      Pour toute question : <a href="https://www.garde-manger.com/fr/" target="_blank">garde-manger.com</a>
    `;
    messageDiv.style.color = "white";
    return;
  }

  // Lead qualifié → envoyer à Formspree et afficher confirmation
  fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(response => {
    messageDiv.innerHTML = `
      <h2>Merci pour votre réservation !</h2>
      <p>Vous recevrez un appel 1 jour avant la consultation pour confirmer votre présence.</p>
      <p>Pour toute question, visitez : <a href="https://www.garde-manger.com/fr/" target="_blank">garde-manger.com</a></p>
    `;
    messageDiv.style.color = "white";
    form.reset();
  }).catch(error => {
    messageDiv.innerHTML = "Une erreur est survenue, veuillez réessayer.";
    messageDiv.style.color = "white";
  });
});
</script>

</body>
</html>
